x-db-url: &db-url
  DATABASE_URL: postgresql://${POSTGRES_USER:-trustcore}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-trustcore_memory}

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: trustcore-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trustcore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-trustcore_memory}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trustcore}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: trustcore-ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_MAX_LOADED_MODELS: "1"
    ports:
      - "11434:11434"
    volumes:
      - C:/Users/Admin/.ollama:/root/.ollama
    restart: unless-stopped

  alex:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        AGENT_MODE: alex
    container_name: trustcore-alex
    command: ["node", "--loader", "ts-node/esm", "src/index.ts", "alex"]
    env_file: .env
    environment:
      <<: *db-url
      OLLAMA_HOST: http://ollama:11434
      LLM_MODEL: "qwen3.5:35b-a3b"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  research:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        AGENT_MODE: research
    container_name: trustcore-research
    command: ["node", "--loader", "ts-node/esm", "src/index.ts", "research"]
    env_file: .env
    environment:
      <<: *db-url
      OLLAMA_HOST: http://ollama:11434
      LLM_MODEL: "qwen3.5:9b"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: trustcore-mcp
    command: ["node", "--loader", "ts-node/esm", "src/index.ts"]
    env_file: .env
    environment:
      <<: *db-url
      OLLAMA_HOST: http://ollama:11434
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  email-writer:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        AGENT_MODE: email-writer
    container_name: trustcore-email-writer
    command: ["node", "--loader", "ts-node/esm", "src/index.ts", "email-writer"]
    env_file: .env
    environment:
      <<: *db-url
      OLLAMA_HOST: http://ollama:11434
      LLM_MODEL: "qwen3.5:9b"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  resource-manager:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: trustcore-resource-manager
    command: ["node", "--loader", "ts-node/esm", "src/resource-manager/standalone.ts"]
    env_file: .env
    environment:
      <<: *db-url
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
    # nvidia-smi requires host GPU access; if unavailable the service uses mock data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: trustcore-api
    command: ["node", "--loader", "ts-node/esm", "src/index.ts", "api"]
    env_file: .env
    environment:
      <<: *db-url
      OLLAMA_HOST: http://ollama:11434
      API_PORT: "3003"
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3003
    container_name: trustcore-dashboard
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3003
    ports:
      - "3004:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
